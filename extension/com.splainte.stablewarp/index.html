<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>StableWarp</title>
<style>
  html, body { height:100%; }
  body { background:#232323; color:#d6d6d6; font:12px/1.5 -apple-system, "Segoe UI", sans-serif;
         margin:0; padding:14px; box-sizing:border-box; display:flex; flex-direction:column; }
  h1 { font-size:15px; margin:0; color:#fff; }
  .sub { color:#888; margin:2px 0 14px; font-size:11px; }
  #stabBtn { display:block; width:100%; padding:12px; font-size:14px; font-weight:bold;
             background:#2d6cdf; color:#fff; border:none; border-radius:6px; cursor:pointer; }
  #stabBtn:hover { background:#3b7af0; }
  #stabBtn:disabled { background:#444; color:#999; cursor:default; }
  #unstabBtn { display:block; width:100%; margin-top:8px; padding:7px; font-size:11px;
               background:transparent; color:#999; border:1px solid #4a4a4a;
               border-radius:6px; cursor:pointer; }
  #unstabBtn:hover { color:#ddd; border-color:#666; }
  .row { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .row label { color:#aaa; flex:1; }
  input[type="checkbox"] { accent-color:#2d6cdf; }
  #watchState { font-size:11px; color:#6da56d; }
  #watchState.off { color:#a05c5c; }
  #log { background:#1b1b1b; border:1px solid #3a3a3a; border-radius:4px; padding:8px;
         margin-top:14px; flex:1; min-height:100px; overflow-y:auto; white-space:pre-wrap;
         font-family:Consolas, Menlo, monospace; font-size:11px; }
  .ok { color:#7fd17f; } .err { color:#ff8a8a; } .info { color:#7cb8ff; } .dim { color:#777; }
  .footer { display:flex; justify-content:space-between; align-items:center;
            margin-top:8px; font-size:10px; color:#666; }
  #updateBtn { background:transparent; color:#888; border:1px solid #4a4a4a;
               border-radius:4px; padding:3px 8px; font-size:10px; cursor:pointer; }
  #updateBtn:hover { color:#ccc; border-color:#666; }
  #updateBtn:disabled { color:#666; cursor:default; }
  #updateBtn.available { background:#3a5a3a; color:#bfe8bf; border-color:#4f7a4f; }
  #updateBtn.available:hover { background:#456b45; }
</style>
</head>
<body>
  <h1>StableWarp</h1>
  <div class="sub">Stabilisez vos ralentis/accélérés sans prise de tête</div>

  <button id="stabBtn" onclick="stabilize()">Stabiliser la sélection</button>
  <button id="unstabBtn" onclick="unstabilize()">Dé-stabiliser (restaurer le rush d'origine)</button>

  <div class="row">
    <label for="watch">Re-stab auto si les in/out bougent (recommandé)</label>
    <input id="watch" type="checkbox" checked onchange="updateWatcher()">
    <span id="watchState">active</span>
  </div>

  <div class="row">
    <label for="banner">Détecteur de bandeau bleu — relance l'analyse (EN TEST, laisser décoché)</label>
    <input id="banner" type="checkbox" onchange="updateWatcher()">
    <span id="bannerState" class="off">coupée</span>
  </div>

  <button id="diagBtn" onclick="diagWarp()" style="display:block;width:100%;margin-top:8px;padding:7px;font-size:11px;background:#3a2d4a;color:#cdbbe0;border:1px solid #5a4a6a;border-radius:6px;cursor:pointer;">🔍 SONDE : diag Warp (clip sélectionné)</button>

  <div id="log"></div>

  <div class="footer">
    <span id="version"></span>
    <button id="updateBtn" onclick="checkUpdate()">Vérifier les mises à jour</button>
  </div>

<script>
  var SW_VERSION = '1.0.0';
  var SW_REPO = 'Splainte/StableWarp';

  var logEl = document.getElementById('log');
  var watchTimer = null;
  var busy = false;
  var updateUrl = null;
  var updating = false;

  document.getElementById('version').textContent = 'v' + SW_VERSION;

  function log(msg, cls) {
    if (!msg) return;
    var lines = String(msg).split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = document.createElement('div');
      line.className = cls || (lines[i].indexOf('ECHEC') >= 0 ? 'err' : 'ok');
      line.textContent = lines[i];
      logEl.appendChild(line);
    }
    while (logEl.childNodes.length > 300) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function evalJSX(call, cb) {
    window.__adobe_cep__.evalScript(call, cb);
  }

  function stabilize() {
    if (busy) return;
    busy = true;
    var btn = document.getElementById('stabBtn');
    btn.disabled = true;
    btn.textContent = 'Stabilisation…';
    log('▶ Stabilisation de la sélection', 'info');
    evalJSX('SW_stabilizeSelection()', function (res) {
      log(res === 'EvalScript error.' ? 'ECHEC erreur ExtendScript' : res);
      btn.disabled = false;
      btn.textContent = 'Stabiliser la sélection';
      busy = false;
    });
  }

  function unstabilize() {
    if (busy) return;
    busy = true;
    log('▶ Dé-stabilisation de la sélection', 'info');
    evalJSX('SW_unstabilizeSelection()', function (res) {
      log(res === 'EvalScript error.' ? 'ECHEC erreur ExtendScript' : res);
      busy = false;
    });
  }

  function diagWarp() {
    log('▶ SONDE diag Warp', 'info');
    evalJSX('SW_diagWarp()', function (res) {
      log(res === 'EvalScript error.' ? 'ECHEC erreur ExtendScript' : res, 'dim');
    });
  }

  function watchTick() {
    if (busy) return;
    var restab = document.getElementById('watch').checked ? 1 : 0;
    var banner = document.getElementById('banner').checked ? 1 : 0;
    if (!restab && !banner) return;
    evalJSX('SW_watchTick(' + restab + ', ' + banner + ')', function (res) {
      if (res && res !== 'EvalScript error.') log(res); // ECHEC en rouge ligne par ligne
    });
  }

  function _setState(id, on) {
    var el = document.getElementById(id);
    el.textContent = on ? 'active' : 'coupée';
    el.className = on ? '' : 'off';
  }

  function updateWatcher() {
    var restab = document.getElementById('watch').checked;
    var banner = document.getElementById('banner').checked;
    _setState('watchState', restab);
    _setState('bannerState', banner);
    if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
    if (restab || banner) watchTimer = setInterval(watchTick, 2500);
  }

  // ---- mise à jour (GitHub Releases, même principe que Sauron) ----

  function newerThan(remote, local) {
    var r = remote.split('.'), l = local.split('.');
    for (var i = 0; i < Math.max(r.length, l.length); i++) {
      var a = parseInt(r[i] || '0', 10), b = parseInt(l[i] || '0', 10);
      if (a !== b) return a > b;
    }
    return false;
  }

  // récupère la dernière release publiée (silencieux si repo privé / sans release)
  function fetchLatest(cb) {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://api.github.com/repos/' + SW_REPO + '/releases/latest', true);
      xhr.onload = function () {
        if (xhr.status !== 200) { cb('HTTP ' + xhr.status); return; }
        try { cb(null, JSON.parse(xhr.responseText)); } catch (e) { cb(String(e)); }
      };
      xhr.onerror = function () { cb('réseau indisponible'); };
      xhr.send();
    } catch (e) { cb(String(e)); }
  }

  // mémorise l'URL de l'asset setup*.exe (repli : page de la release)
  function pickAsset(rel) {
    var assets = rel.assets || [];
    updateUrl = rel.html_url;
    for (var i = 0; i < assets.length; i++) {
      if (/setup.*\.exe$/i.test(assets[i].name)) { updateUrl = assets[i].browser_download_url; break; }
    }
  }

  // au démarrage : vérif silencieuse, met juste le bouton en avant si MàJ dispo
  function autoCheck() {
    fetchLatest(function (err, rel) {
      if (err) return;
      var tag = (rel.tag_name || '').replace(/^v/, '');
      if (tag && newerThan(tag, SW_VERSION)) {
        pickAsset(rel);
        var btn = document.getElementById('updateBtn');
        btn.textContent = 'Mise à jour v' + tag + ' disponible';
        btn.classList.add('available');
      }
    });
  }

  // clic sur le bouton : vérifie, et installe si une version plus récente existe
  function checkUpdate() {
    if (updating) return;
    updating = true;
    var btn = document.getElementById('updateBtn');
    btn.disabled = true;
    log('Recherche de mise à jour…', 'info');
    fetchLatest(function (err, rel) {
      if (err) { log('ECHEC vérification : ' + err); updating = false; btn.disabled = false; return; }
      var tag = (rel.tag_name || '').replace(/^v/, '');
      if (!tag || !newerThan(tag, SW_VERSION)) {
        log('StableWarp est à jour (v' + SW_VERSION + ').', 'info');
        updating = false; btn.disabled = false; return;
      }
      log('Nouvelle version disponible : v' + tag, 'info');
      pickAsset(rel);
      installUpdate(tag, btn);
    });
  }

  // suit les redirections (GitHub Releases → S3) puis écrit le fichier sur disque
  function httpsDownload(url, dest, cb) {
    var https = require('https');
    var fs = require('fs');
    https.get(url, { headers: { 'User-Agent': 'StableWarp' } }, function (res) {
      if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
        return httpsDownload(res.headers.location, dest, cb);
      }
      if (res.statusCode !== 200) { cb('HTTP ' + res.statusCode); return; }
      var out = fs.createWriteStream(dest);
      res.pipe(out);
      out.on('finish', function () { out.close(function () { cb(null); }); });
      out.on('error', function (e) { cb(String(e)); });
    }).on('error', function (e) { cb(String(e)); });
  }

  // télécharge l'installeur et le lance (Windows), ou relance le script d'install (macOS)
  function installUpdate(tag, btn) {
    try {
      var os = require('os'), path = require('path'), cp = require('child_process');
      if (process.platform === 'win32') {
        if (!updateUrl) { log('ECHEC : pas d’installeur dans la release'); updating = false; btn.disabled = false; return; }
        var dest = path.join(os.tmpdir(), 'StableWarp-Setup-v' + tag + '.exe');
        log('Téléchargement de l’installeur…', 'info');
        httpsDownload(updateUrl, dest, function (err) {
          if (err) { log('ECHEC téléchargement : ' + err); updating = false; btn.disabled = false; return; }
          // .exe détaché direct => « spawn UNKNOWN » avec le Node de CEP ; passer par cmd /c start
          cp.spawn('cmd.exe', ['/c', 'start', '', dest], { detached: true, stdio: 'ignore', windowsHide: true }).unref();
          log('Installeur lancé : suis l’assistant, puis redémarre Premiere.', 'info');
          updating = false; btn.disabled = false;
        });
      } else {
        var sh = path.join(os.tmpdir(), 'stablewarp-install.sh');
        log('Téléchargement du programme d’installation…', 'info');
        httpsDownload('https://raw.githubusercontent.com/' + SW_REPO + '/main/install/install-macos.sh', sh, function (err) {
          if (err) { log('ECHEC téléchargement : ' + err); updating = false; btn.disabled = false; return; }
          cp.spawn('/bin/bash', [sh], { detached: true, stdio: 'ignore' }).unref();
          log('Mise à jour en cours — patiente, puis redémarre Premiere.', 'info');
          updating = false; btn.disabled = false;
        });
      }
    } catch (e) {
      log('ECHEC mise à jour : ' + e);
      updating = false; btn.disabled = false;
    }
  }

  evalJSX('SW_env()', function (res) { log(res, 'dim'); });
  updateWatcher();
  autoCheck();
</script>
</body>
</html>
