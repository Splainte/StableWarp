# À chaque tag v* : compile l'installeur Windows (Inno Setup) et publie la
# release GitHub avec StableWarp-Setup.exe en pièce jointe. C'est cette release
# que le bouton « Mise à jour disponible » du panneau interroge puis télécharge.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier que le manifest est à la version du tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $manifest = Get-Content extension/com.splainte.stablewarp/CSXS/manifest.xml -Raw
          if ($manifest -notmatch [regex]::Escape("ExtensionBundleVersion=`"$tag`"")) {
            Write-Error "manifest.xml n'est pas en version $tag — mettre a jour ExtensionBundleVersion (x2) avant de tagger."
          }

      - name: Compiler l'installeur (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          $tag = "${{ github.ref_name }}".TrimStart("v")
          & $iscc /DAppVersion=$tag installer\stablewarp.iss

      - name: Publier la release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" installer/Output/StableWarp-Setup.exe `
            --title "StableWarp ${{ github.ref_name }}" --generate-notes
