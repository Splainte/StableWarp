<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>StableWarp</title>
<style>
  html, body { height:100%; }
  body { background:#232323; color:#d6d6d6; font:12px/1.5 -apple-system, "Segoe UI", sans-serif;
         margin:0; padding:14px; box-sizing:border-box; display:flex; flex-direction:column; }
  h1 { font-size:15px; margin:0; color:#fff; }
  .sub { color:#888; margin:2px 0 14px; font-size:11px; }
  #stabBtn { display:block; width:100%; padding:12px; font-size:14px; font-weight:bold;
             background:#2d6cdf; color:#fff; border:none; border-radius:6px; cursor:pointer; }
  #stabBtn:hover { background:#3b7af0; }
  #stabBtn:disabled { background:#444; color:#999; cursor:default; }
  .row { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .row label { color:#aaa; flex:1; }
  input[type="checkbox"] { accent-color:#2d6cdf; }
  #watchState { font-size:11px; color:#6da56d; }
  #watchState.off { color:#a05c5c; }
  #log { background:#1b1b1b; border:1px solid #3a3a3a; border-radius:4px; padding:8px;
         margin-top:14px; flex:1; min-height:100px; overflow-y:auto; white-space:pre-wrap;
         font-family:Consolas, Menlo, monospace; font-size:11px; }
  .ok { color:#7fd17f; } .err { color:#ff8a8a; } .info { color:#7cb8ff; } .dim { color:#777; }
  .footer { display:flex; justify-content:space-between; align-items:center;
            margin-top:8px; font-size:10px; color:#666; }
  #updateBtn { display:none; background:#3a5a3a; color:#bfe8bf; border:1px solid #4f7a4f;
               border-radius:4px; padding:3px 8px; font-size:10px; cursor:pointer; }
  #updateBtn:hover { background:#456b45; }
</style>
</head>
<body>
  <h1>StableWarp</h1>
  <div class="sub">Stabilisez vos ralentis/accélérés sans prise de tête</div>

  <button id="stabBtn" onclick="stabilize()">Stabiliser la sélection</button>

  <div class="row">
    <label for="watch">Re-stab auto si les in/out bougent (recommandé)</label>
    <input id="watch" type="checkbox" checked onchange="updateWatcher()">
    <span id="watchState">active</span>
  </div>

  <div id="log"></div>

  <div class="footer">
    <span id="version"></span>
    <button id="updateBtn" onclick="openUpdate()">Mise à jour disponible</button>
  </div>

<script>
  var SW_VERSION = '0.2.0';
  var SW_REPO = 'Splainte/StableWarp';

  var logEl = document.getElementById('log');
  var watchTimer = null;
  var busy = false;
  var updateUrl = null;

  document.getElementById('version').textContent = 'v' + SW_VERSION;

  function log(msg, cls) {
    if (!msg) return;
    var lines = String(msg).split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = document.createElement('div');
      line.className = cls || (lines[i].indexOf('ECHEC') >= 0 ? 'err' : 'ok');
      line.textContent = lines[i];
      logEl.appendChild(line);
    }
    while (logEl.childNodes.length > 300) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function evalJSX(call, cb) {
    window.__adobe_cep__.evalScript(call, cb);
  }

  function stabilize() {
    if (busy) return;
    busy = true;
    var btn = document.getElementById('stabBtn');
    btn.disabled = true;
    btn.textContent = 'Stabilisation…';
    log('▶ Stabilisation de la sélection', 'info');
    evalJSX('SW_stabilizeSelection()', function (res) {
      log(res === 'EvalScript error.' ? 'ECHEC erreur ExtendScript' : res);
      btn.disabled = false;
      btn.textContent = 'Stabiliser la sélection';
      busy = false;
    });
  }

  function watchTick() {
    if (busy) return;
    evalJSX('SW_watchTick()', function (res) {
      if (res && res !== 'EvalScript error.') log(res, 'info');
    });
  }

  function updateWatcher() {
    var on = document.getElementById('watch').checked;
    var state = document.getElementById('watchState');
    if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
    if (on) {
      watchTimer = setInterval(watchTick, 2500);
      state.textContent = 'active';
      state.className = '';
    } else {
      state.textContent = 'coupée';
      state.className = 'off';
    }
  }

  // ---- mise à jour (GitHub Releases, même principe que Sauron) ----

  function newerThan(remote, local) {
    var r = remote.split('.'), l = local.split('.');
    for (var i = 0; i < Math.max(r.length, l.length); i++) {
      var a = parseInt(r[i] || '0', 10), b = parseInt(l[i] || '0', 10);
      if (a !== b) return a > b;
    }
    return false;
  }

  function checkUpdate() {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://api.github.com/repos/' + SW_REPO + '/releases/latest', true);
      xhr.onload = function () {
        if (xhr.status !== 200) return; // repo privé ou pas encore de release : silencieux
        try {
          var rel = JSON.parse(xhr.responseText);
          var tag = (rel.tag_name || '').replace(/^v/, '');
          if (tag && newerThan(tag, SW_VERSION)) {
            updateUrl = (rel.assets && rel.assets.length) ? rel.assets[0].browser_download_url : rel.html_url;
            var btn = document.getElementById('updateBtn');
            btn.textContent = 'Mise à jour v' + tag + ' disponible';
            btn.style.display = 'inline-block';
          }
        } catch (e) {}
      };
      xhr.send();
    } catch (e) {}
  }

  function openUpdate() {
    if (updateUrl && window.cep && window.cep.util) {
      window.cep.util.openURLInDefaultBrowser(updateUrl);
    }
  }

  evalJSX('SW_env()', function (res) { log(res, 'dim'); });
  updateWatcher();
  checkUpdate();
</script>
</body>
</html>
